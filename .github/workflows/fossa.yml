name: FOSSA License Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fossa-scan:
    runs-on: [self-hosted, ubuntu-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v3
      - uses: fossas/fossa-action@ff70fe9fe17cbd2040648f1c45e8ec4e4884dcf3 # ratchet:fossas/fossa-action@main
        with:
          api-key: ${{secrets.FOSSA_API_KEY}}
